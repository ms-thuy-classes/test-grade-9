<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EnglishCBT — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root {
  --blue-50:#EBF4FF;--blue-100:#C3DFFE;--blue-200:#93C5FD;
  --blue-500:#3B82F6;--blue-600:#2563EB;--blue-700:#1D4ED8;
  --bg:#F0F7FF;--card:#FFFFFF;--border:#DBEAFE;
  --text:#1E3A5F;--text2:#4A6FA5;--muted:#94A3B8;
  --green:#10B981;--green-l:#D1FAE5;
  --red:#EF4444;--red-l:#FEE2E2;
  --orange:#F59E0B;--orange-l:#FEF3C7;
  --r:12px;--r-sm:8px;
  --sh:0 2px 12px rgba(37,99,235,.07);
  --sh-md:0 4px 24px rgba(37,99,235,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}

/* NAV */
.nav{background:#fff;border-bottom:1px solid var(--border);padding:0 2rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--sh)}
.brand{font-family:'DM Serif Display',serif;font-size:1.25rem;color:var(--blue-600);display:flex;align-items:center;gap:8px;text-decoration:none}
.nav-links{display:flex;gap:4px}
.nav-link{padding:6px 16px;border-radius:20px;border:none;background:transparent;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;font-weight:500;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center}
.nav-link:hover{background:var(--bg)}
.nav-link.active{background:var(--blue-50);color:var(--blue-600)}

/* HERO */
.hero{background:linear-gradient(135deg,#EBF4FF 0%,#EDE9FE 100%);border-bottom:1px solid var(--border);padding:3rem 2rem}
.hero-inner{max-width:900px;margin:0 auto}
.hero h1{font-family:'DM Serif Display',serif;font-size:2.2rem;color:var(--text);margin-bottom:.5rem}
.hero p{color:var(--text2);font-size:1rem;max-width:500px}
.hero-stats{display:flex;gap:2rem;margin-top:1.5rem;flex-wrap:wrap}
.hero-stat-num{font-family:'DM Serif Display',serif;font-size:1.8rem;color:var(--blue-600)}
.hero-stat-label{font-size:12px;color:var(--muted);margin-top:2px}

/* MAIN */
.main{max-width:900px;margin:0 auto;padding:2rem}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.section-title{font-family:'DM Serif Display',serif;font-size:1.3rem;color:var(--text)}

/* FILTER */
.filter-bar{display:flex;gap:10px;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-wrap input{width:100%;padding:9px 14px 9px 36px;border:1px solid var(--border);border-radius:24px;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;background:#fff;color:var(--text);transition:border-color .2s}
.search-wrap input:focus{border-color:var(--blue-500)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none}
.filter-chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:#fff;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.chip:hover{border-color:var(--blue-500);color:var(--blue-600)}
.chip.active{background:var(--blue-600);border-color:var(--blue-600);color:#fff}

/* TEST CARDS */
.test-grid{display:grid;gap:1rem}
.test-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;display:grid;grid-template-columns:1fr auto;gap:1rem;align-items:center;box-shadow:var(--sh);transition:transform .2s,box-shadow .2s;text-decoration:none;color:inherit}
.test-card:hover{transform:translateY(-2px);box-shadow:var(--sh-md);border-color:var(--blue-200)}
.tc-left{}
.tc-top{display:flex;align-items:center;gap:10px;margin-bottom:.4rem}
.tc-num{background:var(--blue-600);color:#fff;font-family:'DM Serif Display',serif;font-size:.85rem;padding:3px 10px;border-radius:6px}
.tc-title{font-size:1.05rem;font-weight:600;color:var(--text)}
.tc-desc{font-size:13px;color:var(--text2);margin-bottom:.75rem}
.tc-meta{display:flex;gap:8px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
.badge-blue{background:var(--blue-50);color:var(--blue-600)}
.badge-green{background:var(--green-l);color:#065F46}
.badge-orange{background:var(--orange-l);color:#92400E}
.badge-gray{background:#F1F5F9;color:#475569}
.badge-purple{background:#EDE9FE;color:#6D28D9}

.tc-right{display:flex;flex-direction:column;align-items:flex-end;gap:10px}
.score-pill{background:var(--blue-50);border:1px solid var(--blue-200);border-radius:var(--r-sm);padding:8px 14px;text-align:center;min-width:80px}
.score-pill-num{font-family:'DM Serif Display',serif;font-size:1.4rem;color:var(--blue-700);line-height:1}
.score-pill-label{font-size:10px;color:var(--muted);margin-top:2px}
.btn{padding:9px 20px;border-radius:24px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;font-size:14px;transition:all .2s;text-decoration:none;display:inline-block;text-align:center}
.btn-primary{background:var(--blue-600);color:#fff}
.btn-primary:hover{background:var(--blue-700);transform:translateY(-1px)}
.btn-secondary{background:var(--blue-50);color:var(--blue-600);border:1px solid var(--blue-200)}
.btn-secondary:hover{background:var(--blue-100)}

/* EMPTY */
.empty{text-align:center;padding:3rem;color:var(--muted)}
.empty-icon{font-size:3rem;margin-bottom:1rem}

/* SKELETON */
.skeleton{background:linear-gradient(90deg,#EFF6FF 25%,#DBEAFE 50%,#EFF6FF 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--r-sm)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-card{height:120px;border-radius:var(--r);margin-bottom:1rem}

/* HISTORY TABLE */
.history-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;box-shadow:var(--sh);margin-top:2rem}
.history-card h3{font-family:'DM Serif Display',serif;font-size:1.1rem;margin-bottom:1rem;color:var(--text)}
.history-table{width:100%;border-collapse:collapse;font-size:13px}
.history-table th{text-align:left;padding:8px 12px;color:var(--muted);font-weight:500;border-bottom:1px solid var(--border);background:var(--bg)}
.history-table td{padding:9px 12px;border-bottom:1px solid #F1F5F9;color:var(--text)}
.history-table tr:last-child td{border-bottom:none}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:#1E3A5F;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:all .3s;z-index:1000;white-space:nowrap;box-shadow:var(--sh-md)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:600px){
  .hero{padding:2rem 1rem}
  .main{padding:1rem}
  .test-card{grid-template-columns:1fr}
  .tc-right{flex-direction:row;justify-content:space-between;align-items:center}
  .nav-links{display:none}
}
</style>
</head>
<body>

<nav class="nav">
  <a class="brand" href="index.html">📘 EnglishCBT</a>
  <div class="nav-links">
    <a class="nav-link active" href="index.html">Dashboard</a>
    <a class="nav-link" href="#history" onclick="scrollToHistory()">Lịch sử</a>
  </div>
</nav>

<div class="hero">
  <div class="hero-inner">
    <h1>Luyện thi tiếng Anh</h1>
    <p>Hệ thống CBT hiện đại — làm bài, chấm điểm, ôn từ vựng, luyện quiz tất cả trong một nơi.</p>
    <div class="hero-stats">
      <div>
        <div class="hero-stat-num" id="total-tests">—</div>
        <div class="hero-stat-label">Đề thi</div>
      </div>
      <div>
        <div class="hero-stat-num" id="total-done">—</div>
        <div class="hero-stat-label">Đã làm</div>
      </div>
      <div>
        <div class="hero-stat-num" id="best-score">—</div>
        <div class="hero-stat-label">Điểm cao nhất</div>
      </div>
    </div>
  </div>
</div>

<div class="main">
  <div class="section-header">
    <div class="section-title">📚 Danh sách đề thi</div>
    <div style="font-size:12px; color:var(--muted);" id="source-indicator"></div>
  </div>

  <div class="filter-bar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search" placeholder="Tìm kiếm đề thi..." oninput="filterCards()">
    </div>
    <div class="filter-chips" id="tag-chips">
      <button class="chip active" data-tag="all" onclick="setTag(this,'all')">📋 Tất cả</button>
    </div>
  </div>

  <div id="skeleton-area">
    <div class="skeleton skel-card"></div>
    <div class="skeleton skel-card" style="opacity:.6"></div>
  </div>
  <div id="test-grid" class="test-grid" style="display:none"></div>
  <div id="empty-state" class="empty" style="display:none">
    <div class="empty-icon">🔍</div>
    <p>Không tìm thấy đề thi nào.</p>
  </div>

  <div class="history-card" id="history" style="display:none">
    <h3>📊 Lịch sử làm bài</h3>
    <table class="history-table">
      <thead><tr><th>Đề thi</th><th>Ngày</th><th>Điểm</th><th>Đúng</th><th></th></tr></thead>
      <tbody id="history-body"></tbody>
    </table>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ==========================================
// LOAD DATA FROM BOTH data/ AND data2/ FOLDERS
// ==========================================
let articles = [];
let activeTag = 'all';
let loadedFrom = '';

// Hàm thử fetch từ nhiều nguồn
async function tryFetchSources(paths) {
  for (const path of paths) {
    try {
      const res = await fetch(path);
      if (res.ok) {
        const data = await res.json();
        return { data, source: path };
      }
    } catch(e) {}
  }
  return null;
}

async function loadArticles() {
  // Thử load từ nhiều nguồn khác nhau
  const sources = [
    'data/articles.json',
    'data2/articles.json',
    'data/articles.json?t=' + Date.now(),
    'data2/articles.json?t=' + Date.now()
  ];
  
  const result = await tryFetchSources(sources);
  
  if (result) {
    articles = result.data.tests || result.data;
    loadedFrom = result.source;
    document.getElementById('source-indicator').innerHTML = `📁 Nguồn: ${loadedFrom}`;
    showToast(`✅ Đã tải ${articles.length} đề thi từ ${loadedFrom}`);
  } else {
    // Fallback data nếu không load được file nào
    console.warn('Không thể load từ data/ hoặc data2/, dùng fallback data');
    articles = [
      {
        id: "test19",
        title: "Practice Test 19 - Full Skills",
        description: "Phát âm, Từ vựng, Đọc hiểu, Điền từ, Viết lại câu",
        dataFile: "data/test19.json",
        duration: 60,
        totalQuestions: 40,
        tags: ["pronunciation", "reading", "grammar"],
        difficulty: "medium",
        status: "available"
      },
      {
        id: "test20",
        title: "Practice Test 20 - Reading Focus",
        description: "Đọc hiểu chuyên sâu với 35 câu hỏi",
        dataFile: "data2/test20.json",
        duration: 55,
        totalQuestions: 35,
        tags: ["reading", "vocabulary"],
        difficulty: "advanced",
        status: "coming_soon"
      }
    ];
    loadedFrom = "fallback (built-in)";
    document.getElementById('source-indicator').innerHTML = `📁 Nguồn: Dữ liệu mặc định`;
  }
  
  renderCards(articles);
  buildTagChips();
  updateHeroStats();
}

function buildTagChips() {
  const tags = new Set(['all']);
  articles.forEach(a => (a.tags || []).forEach(t => tags.add(t)));
  const container = document.getElementById('tag-chips');
  container.innerHTML = '';
  tags.forEach(tag => {
    const btn = document.createElement('button');
    btn.className = 'chip' + (tag === 'all' ? ' active' : '');
    btn.dataset.tag = tag;
    const tagNames = {
      'all': '📋 Tất cả',
      'pronunciation': '🔊 Phát âm',
      'reading': '📖 Đọc hiểu',
      'grammar': '📝 Ngữ pháp',
      'vocabulary': '📚 Từ vựng'
    };
    btn.textContent = tagNames[tag] || (tag === 'all' ? '📋 Tất cả' : tag.charAt(0).toUpperCase() + tag.slice(1));
    btn.onclick = () => setTag(btn, tag);
    container.appendChild(btn);
  });
}

function setTag(el, tag) {
  activeTag = tag;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  filterCards();
}

function filterCards() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = articles.filter(a => {
    const matchSearch = a.title.toLowerCase().includes(q) || (a.description || '').toLowerCase().includes(q);
    const matchTag = activeTag === 'all' || (a.tags || []).includes(activeTag);
    return matchSearch && matchTag;
  });
  renderCards(filtered);
}

function renderCards(list) {
  document.getElementById('skeleton-area').style.display = 'none';
  const grid = document.getElementById('test-grid');
  const empty = document.getElementById('empty-state');
  if (!list.length) { 
    grid.style.display = 'none'; 
    empty.style.display = 'block'; 
    return; 
  }
  grid.style.display = 'grid';
  empty.style.display = 'none';

  grid.innerHTML = '';
  list.forEach(a => {
    const history = getTestHistory(a.id);
    const done = history.length > 0;
    const best = done ? Math.max(...history.map(h => parseFloat(h.score))) : null;
    
    // Xác định đường dẫn đúng cho file test
    let testUrl = `test.html?test=${a.id}`;
    
    const card = document.createElement('a');
    card.className = 'test-card';
    card.href = testUrl;
    
    // Xác định trạng thái đề thi
    const isAvailable = a.status !== 'coming_soon';
    const statusBadge = isAvailable ? 
      '<span class="badge badge-green">✅ Sẵn sàng</span>' : 
      '<span class="badge badge-orange">🔜 Sắp ra mắt</span>';
    
    card.innerHTML = `
      <div class="tc-left">
        <div class="tc-top">
          <span class="tc-num">${a.id.replace('test', 'Test ')}</span>
          <span class="tc-title">${a.title}</span>
        </div>
        <div class="tc-desc">${a.description || ''}</div>
        <div class="tc-meta">
          <span class="badge badge-blue">⏱ ${a.duration} phút</span>
          <span class="badge badge-blue">📝 ${a.totalQuestions} câu</span>
          ${statusBadge}
          ${done ? `<span class="badge badge-green">📊 Đã làm ${history.length} lần</span>` : ''}
          ${(a.tags || []).map(t => {
            const tagNames = {'pronunciation':'🔊 Phát âm','reading':'📖 Đọc','grammar':'📝 Ngữ pháp','vocabulary':'📚 Từ vựng'};
            return `<span class="badge badge-gray">${tagNames[t] || t}</span>`;
          }).join('')}
        </div>
        ${done && history[0] ? `<div style="font-size:12px;color:var(--muted);margin-top:6px;">📅 Lần gần nhất: ${history[0].date} · Đúng ${history[0].correct}/${a.totalQuestions}</div>` : ''}
      </div>
      <div class="tc-right">
        ${done ? `<div class="score-pill"><div class="score-pill-num">${best}/10</div><div class="score-pill-label">Best score</div></div>` : ''}
        <span class="btn ${isAvailable ? 'btn-primary' : 'btn-secondary'}" style="${!isAvailable ? 'opacity:0.6;cursor:not-allowed' : ''}" onclick="${isAvailable ? '' : 'event.preventDefault(); showToast(\'Đề thi đang được phát triển!\'); return false;'}">
          ${isAvailable ? (done ? '✏️ Làm lại →' : '🎯 Bắt đầu →') : '🔒 Sắp mở'}
        </span>
      </div>
    `;
    
    // Nếu không available, vô hiệu hóa link
    if (!isAvailable) {
      card.href = 'javascript:void(0)';
      card.style.cursor = 'default';
    }
    
    grid.appendChild(card);
  });
}

function updateHeroStats() {
  document.getElementById('total-tests').textContent = articles.length;
  const history = JSON.parse(localStorage.getItem('cbt_all_history') || '[]');
  const doneIds = new Set(history.map(h => h.testId));
  document.getElementById('total-done').textContent = doneIds.size;
  const scores = history.map(h => parseFloat(h.score)).filter(Boolean);
  const bestScore = scores.length ? Math.max(...scores) : null;
  document.getElementById('best-score').textContent = bestScore ? bestScore + '/10' : '—';
}

function getTestHistory(id) {
  const all = JSON.parse(localStorage.getItem('cbt_all_history') || '[]');
  return all.filter(h => h.testId === id);
}

function loadHistory() {
  const all = JSON.parse(localStorage.getItem('cbt_all_history') || '[]');
  const card = document.getElementById('history');
  const tbody = document.getElementById('history-body');
  if (!all.length) return;
  card.style.display = 'block';
  tbody.innerHTML = '';
  all.slice(0, 20).forEach(h => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><strong>${h.testTitle || h.testId}</strong></td>
      <td>${h.date}</td>
      <td><span style="background:${parseFloat(h.score)>=8?'#D1FAE5':parseFloat(h.score)>=5?'#FEF3C7':'#FEE2E2'}; padding:2px 8px; border-radius:20px; font-weight:600;">${h.score}/10</span></td>
      <td>${h.correct}/${h.total}</td>
      <td><a class="btn btn-secondary" href="test.html?test=${h.testId}" style="font-size:12px;padding:5px 12px;">📖 Xem lại</a></td>
    `;
    tbody.appendChild(tr);
  });
}

function scrollToHistory() {
  document.getElementById('history').scrollIntoView({ behavior: 'smooth' });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Khởi tạo
init();

async function init() {
  await loadArticles();
  loadHistory();
}
</script>
</body>
</html>
